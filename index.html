<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DevSkill | Engineering Assessment Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              mono: ['JetBrains Mono', 'monospace'],
            },
            colors: {
              primary: '#000000',
              accent: '#0066FF',
              border: '#27272A',
              surface: '#09090B',
              muted: '#A1A1AA'
            },
            borderRadius: {
              'none': '0px',
            }
          }
        }
      }
    </script>
    <style>
      :root {
        --bg-color: #ffffff;
        --text-main: #000000;
        --border-color: #e4e4e7;
      }

      .dark {
        --bg-color: #000000;
        --text-main: #ffffff;
        --border-color: #27272a;
      }

      * {
        border-radius: 0px !important;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg-color);
        color: var(--text-main);
        -webkit-font-smoothing: antialiased;
        line-height: 1.6;
      }

      p {
        max-width: 65ch;
      }

      .mono-data {
        font-family: 'JetBrains Mono', monospace;
        letter-spacing: -0.01em;
      }

      .label-mono {
        font-family: 'JetBrains Mono', monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      /* Utilitarian Utility Classes */
      .prose-readable {
        line-height: 1.75;
        letter-spacing: -0.01em;
      }

      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: var(--bg-color); }
      ::-webkit-scrollbar-thumb { background: var(--border-color); }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.3.1",
    "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.3.1",
    "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
    "recharts": "https://esm.sh/recharts@2.12.7?external=react,react-dom",
    "lucide-react": "https://esm.sh/lucide-react@0.378.0?external=react",
    "framer-motion": "https://esm.sh/framer-motion@11.2.10?external=react,react-dom",
    "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.3",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
